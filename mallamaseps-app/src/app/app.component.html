<main style="font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 16px;">
  <h1>Mallamaseps App</h1>
  <p>Aplicación cliente independiente (base scaffold).</p>

  <section *ngIf="session; else noSession" style="padding: 12px; background: #f3f4f6; border-radius: 8px; margin-top: 16px;">
    <p><strong>Usuario:</strong> {{ session?.user?.email }}</p>
    <p><strong>Tenant:</strong> {{ session?.tenant?.name }}</p>
    <p><strong>Rol:</strong> {{ session?.user?.role }}</p>
    <button (click)="logout()" style="margin-top: 8px; padding: 8px 14px;">Cerrar sesión</button>
  </section>

  <ng-template #noSession>
    <section style="padding: 12px; background: #fff4e5; border-radius: 8px; margin-top: 16px;">
      <p>No hay sesión. Inicia en el portal auth.</p>
      <a href="http://localhost:4200/login">Ir a login</a>
    </section>
  </ng-template>
</main>
