<ng-container *ngIf="session; else noSession">
  <div class="min-h-screen bg-slate-950 text-slate-100 grid grid-cols-[240px_1fr]">
    <aside class="border-r border-slate-800 bg-slate-950 p-4 flex flex-col gap-5">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-violet-600 grid place-items-center font-bold">M</div>
        <div>
          <p class="font-semibold leading-4">Mallamaseps</p>
          <p class="text-xs text-slate-400">Client App</p>
        </div>
      </div>

      <nav class="flex flex-col gap-2 text-sm">
        <a routerLink="/home" routerLinkActive="bg-violet-900 text-white"
           class="px-3 py-2 rounded-lg hover:bg-slate-800 text-slate-300">Home</a>

        <p class="text-xs text-slate-500 uppercase tracking-wider px-3 pt-2">Manage</p>
        <a routerLink="/usage" routerLinkActive="bg-violet-900 text-white"
           class="px-3 py-2 rounded-lg hover:bg-slate-800 text-slate-300">Usage</a>
        <a routerLink="/api-keys" routerLinkActive="bg-violet-900 text-white"
           class="px-3 py-2 rounded-lg hover:bg-slate-800 text-slate-300">API Keys</a>
        <a routerLink="/billing" routerLinkActive="bg-violet-900 text-white"
           class="px-3 py-2 rounded-lg hover:bg-slate-800 text-slate-300">Billing</a>
      </nav>

      <button class="mt-auto px-3 py-2 rounded-lg bg-red-800 hover:bg-red-700 text-white text-sm" (click)="logout()">
        Logout
      </button>
    </aside>

    <main class="p-6">
      <header class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-semibold">{{ pageTitle }}</h1>
        <div class="text-sm text-slate-400">{{ session?.user?.email ?? '' }}</div>
      </header>

      <router-outlet />
    </main>
  </div>
</ng-container>

<ng-template #noSession>
  <main class="min-h-screen grid place-items-center bg-slate-100 p-4">
    <section class="bg-white rounded-xl shadow px-6 py-5 max-w-sm w-full">
      <h1 class="text-3xl font-bold text-slate-900 mb-3">Mallamaseps App</h1>
      <p class="text-slate-600">No hay sesión. Inicia en el portal auth.</p>
      <a class="text-indigo-600 hover:underline mt-3 inline-block" href="http://localhost:4200/login">Ir a login</a>
    </section>
  </main>
</ng-template>
